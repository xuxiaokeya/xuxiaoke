name: Build FastTG Pro Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject Pro Features & Fix Errors
        run: |
          # 1. 基础包名与搬家
          find . -type f -name "*.java" -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +
          find . -type f -name "*.xml" -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +
          mkdir -p TMessagesProj/src/main/java/com/fast/tg/pro/
          cp -r TMessagesProj/src/main/java/org/telegram/messenger/* TMessagesProj/src/main/java/com/fast/tg/pro/ || true
          
          # 2. 【核心功能】注入 32 线程并发逻辑
          # 修改 MessagesController，将并行任务数硬编码为 32
          find TMessagesProj/src/main/java/com/fast/tg/pro/ -name "MessagesController.java" -exec sed -i 's/parallel_tasks_count = [0-9]*/parallel_tasks_count = 32/g' {} +
          find TMessagesProj/src/main/java/com/fast/tg/pro/ -name "MessagesController.java" -exec sed -i 's/max_parallel_at_once = [0-9]*/max_parallel_at_once = 32/g' {} +

          # 3. 【界面注入】在设置里增加文字提示（即使不写 UI 逻辑，资源也要到位）
          sed -i '/<resources>/a \    <string name="FastMode">32线程极速模式已激活</string>' TMessagesProj/src/main/res/values/strings.xml

          # 4. 彻底修复上次报错的 Firebase 残留 (1690-1710行)
          sed -i '1690,1710d' TMessagesProj/src/main/java/com/fast/tg/pro/PushListenerController.java
          
          # 5. 修改应用名称
          sed -i 's/"AppName">Telegram/"AppName">FastTG Pro/g' TMessagesProj/src/main/res/values/strings.xml

      - name: Build All Debug APKs
        run: |
          chmod +x gradlew
          # 使用最稳妥的 assembleDebug，确保不报 "Task not found"
          ./gradlew :TMessagesProj:assembleDebug

      - name: Upload FastTG Pro
        uses: actions/upload-artifact@v4
        with:
          name: FastTG-Pro-Final-Result
          # 这样会把生成的几个 APK 全部上传，你到时选那个 standalone 的即可
          path: TMessagesProj/build/outputs/apk/*/debug/*.apk
