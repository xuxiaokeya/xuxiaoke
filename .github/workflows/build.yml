name: Build FastTG Pro 32-Thread
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK & CMake
        run: sudo sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Ultimate Pro Surgery
        run: |
          # 1. 注入专属 API 登录信息
          find . -name "BuildVars.java" -exec sed -i 's/APP_ID = [0-9]*/APP_ID = 15270615/g' {} +
          find . -name "BuildVars.java" -exec sed -i 's/APP_HASH = .*/APP_HASH = "fa9eb4bf996673bd8aaf76fa5b2ca8e1";/g' {} +

          # 2. 锁定 32 线程极速引擎 (底层硬改)
          find . -name "MessagesController.java" -exec sed -i 's/parallel_tasks_count = [0-9]*/parallel_tasks_count = 32/g' {} +
          find . -name "MessagesController.java" -exec sed -i 's/max_parallel_at_once = [0-9]*/max_parallel_at_once = 32/g' {} +

          # 3. 注入开关逻辑变量 (默认开启)
          find . -name "SharedConfig.java" -exec sed -i '/public class SharedConfig {/a \    public static boolean isFastMode = true;' {} +

          # 4. 全量改包名 (支持双开共存)
          find . -name "build.gradle" -exec sed -i 's/applicationId "org.telegram.messenger"/applicationId "com.fast.tg.pro"/g' {} +
          find . -type f -name "*.json" -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +

          # 5. 暴力修复报错文件 (解决 Java 编译红线，且不产生 YAML 脚本红线)
          PLC_PATH=$(find . -name "PushListenerController.java")
          echo "package org.telegram.messenger; public class PushListenerController { private static volatile PushListenerController Instance; public static PushListenerController getInstance() { if (Instance == null) Instance = new PushListenerController(); return Instance; } public void getPushToken() { } public boolean hasServices() { return false; } public void editPushRegistration(int a, String b, String c) { } }" > "$PLC_PATH"

          # 6. UI 文字提示 (视觉开关确认)
          STRINGS_PATH=$(find . -name "strings.xml" | grep "/values/strings.xml")
          sed -i 's/"AppName">Telegram/"AppName">FastTG Pro/g' "$STRINGS_PATH"
          sed -i 's/"DataSettings">数据和存储/"DataSettings">数据和存储 (32线程已开启)/g' "$STRINGS_PATH"
          sed -i 's/"Connecting">连接中.../"Connecting">FastTG Pro 极速模式已激活/g' "$STRINGS_PATH"

      - name: Build Pro APK
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj:assembleDebug --continue

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FastTG-Pro-32Thread
          path: TMessagesProj/build/outputs/apk/debug/*.apk
