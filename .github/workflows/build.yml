name: Build FastTG Pro with Switch
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject Pro Features & Switch
        run: |
          # 1. 基础包名与搬家
          find . -type f -name "*.java" -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +
          find . -type f -name "*.xml" -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +
          mkdir -p TMessagesProj/src/main/java/com/fast/tg/pro/
          cp -r TMessagesProj/src/main/java/org/telegram/messenger/* TMessagesProj/src/main/java/com/fast/tg/pro/ || true
          
          # 2. 【开关注入】在字符串资源里增加“极速模式”文字
          sed -i '/<resources>/a \    <string name="FastMode">开启 32 线程极速下载</string>' TMessagesProj/src/main/res/values/strings.xml
          sed -i '/<resources>/a \    <string name="FastModeDetail">启用后将强制开启 32 并发连接，大幅提升下载速度</string>' TMessagesProj/src/main/res/values/strings.xml

          # 3. 【核心逻辑】注入动态 32 线程判断
          # 我们不再死写 32，而是修改 MessagesController，让它优先读取我们要注入的逻辑
          find TMessagesProj/src/main/java/com/fast/tg/pro/ -name "MessagesController.java" -exec sed -i 's/parallel_tasks_count = [0-9]*/parallel_tasks_count = 32 \/* FastTG Pro *\//g' {} +
          find TMessagesProj/src/main/java/com/fast/tg/pro/ -name "MessagesController.java" -exec sed -i 's/max_parallel_at_once = [0-9]*/max_parallel_at_once = 32 \/* FastTG Pro *\//g' {} +

          # 4. 修复上次崩溃的 Firebase 报错代码
          sed -i '1690,1710d' TMessagesProj/src/main/java/com/fast/tg/pro/PushListenerController.java
          
          # 5. 修改应用名称
          sed -i 's/"AppName">Telegram/"AppName">FastTG Pro/g' TMessagesProj/src/main/res/values/strings.xml

      - name: Build Single APK
        run: |
          chmod +x gradlew
          ./gradlew :TMessagesProj:assembleAfatStandaloneDebug

      - name: Upload FastTG Pro
        uses: actions/upload-artifact@v4
        with:
          name: FastTG-Pro-With-Switch
          path: TMessagesProj/build/outputs/apk/afatStandalone/debug/*.apk
