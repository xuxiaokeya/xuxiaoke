name: Build FastTG Pro Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Patch Logic
        run: |
          # 1. 定义物理路径
          OLD_DIR="TMessagesProj/src/main/java/org/telegram/messenger"
          NEW_DIR="TMessagesProj/src/main/java/com/fast/tg/pro"
          OLD_UI_DIR="TMessagesProj/src/main/java/org/telegram/ui"
          NEW_UI_DIR="TMessagesProj/src/main/java/com/fast/tg/pro/ui"

          # 2. 注入 API 信息
          sed -i "s/public static int APP_ID = .*/public static int APP_ID = 15270615;/" $OLD_DIR/BuildVars.java
          sed -i "s/public static String APP_HASH = .*/public static String APP_HASH = \"fa9eb4bf996673bd8aaf76fa5b2ca8e1\";/" $OLD_DIR/BuildVars.java
          
          # 3. 移除 Gradle 中的 Google 依赖
          sed -i '/com.google.gms.google-services/d' TMessagesProj/build.gradle
          sed -i '/firebase-/d' TMessagesProj/build.gradle
          
          # 4. 全局替换包名和应用名称
          find . -type f \( -name "*.gradle" -o -name "*.java" -o -name "*.xml" \) -exec sed -i 's/org.telegram.messenger/com.fast.tg.pro/g' {} +
          find TMessagesProj/src/main/res/ -name "strings.xml" -exec sed -i 's/>Telegram</>FastTG Pro</g' {} +
          
          # 5. 【关键】物理文件夹搬迁
          mkdir -p $NEW_DIR
          mv $OLD_DIR/* $NEW_DIR/
          mkdir -p $NEW_UI_DIR
          mv $OLD_UI_DIR/* $NEW_UI_DIR/

          # 6. 【扫雷】切除 Java 层 Firebase 残留
          find TMessagesProj/src/main/java -name "*.java" -exec sed -i '/import com.google.firebase/d' {} +
          sed -i '/FirebaseUserActions/,/end(assistAction);/d' $NEW_UI_DIR/LaunchActivity.java
          sed -i '/FirebaseApp.initializeApp/d' $NEW_DIR/PushListenerController.java
          sed -i '/FirebaseMessaging.getInstance()/d' $NEW_DIR/PushListenerController.java
          
          # 7. 重写 GCM 服务为标准 Service 空壳
          echo "package com.fast.tg.pro; import android.app.Service; import android.content.Intent; import android.os.IBinder; public class GcmPushListenerService extends Service { @Override public IBinder onBind(Intent intent) { return null; } }" > $NEW_DIR/GcmPushListenerService.java

          # 8. 注入 32 线程逻辑
          sed -i '/public class SharedConfig {/a \    public static boolean useMaxThreads = false;' $NEW_DIR/SharedConfig.java
          sed -i 's/MAX_DOWNLOAD_QUEUE = [0-9]*/MAX_DOWNLOAD_QUEUE = SharedConfig.useMaxThreads ? 32 : 4/g' $NEW_DIR/FileLoader.java
          sed -i 's/MAX_UPLOAD_QUEUE = [0-9]*/MAX_UPLOAD_QUEUE = SharedConfig.useMaxThreads ? 32 : 4/g' $NEW_DIR/FileLoader.java

          # 9. UI 界面开关注入
          sed -i '/listView.setAdapter(listAdapter);/i \
          TextCheckCell threadsCell = new TextCheckCell(getParentActivity()); \
          threadsCell.setTextAndCheck("开启 32 线程极速模式", SharedConfig.useMaxThreads, true); \
          threadsCell.setOnClickListener(v -> { \
              SharedConfig.useMaxThreads = !SharedConfig.useMaxThreads; \
              threadsCell.setChecked(SharedConfig.useMaxThreads); \
              SharedConfig.saveConfig(); \
          }); \
          linearLayout.addView(threadsCell, 0, LayoutHelper.createLinear(LayoutHelper.MATCH_PARENT, LayoutHelper.WRAP_CONTENT));' $NEW_UI_DIR/DataUsageActivity.java

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FastTG-Pro-Final
          path: TMessagesProj/build/outputs/apk/debug/*.apk
